<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="amber-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="bg-glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Subtle infrastructure motif: stack layers (top-right) -->
  <g opacity="0.18" transform="translate(880, 70)">
    <rect x="0" y="0" width="280" height="6" rx="3" fill="#F59E0B"/>
    <rect x="0" y="22" width="220" height="6" rx="3" fill="#F59E0B"/>
    <rect x="0" y="44" width="160" height="6" rx="3" fill="#F59E0B"/>
    <rect x="0" y="66" width="100" height="6" rx="3" fill="#F59E0B"/>
  </g>

  <!-- Monogram "СД" (top-left) -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="15" fill="url(#amber-grad)"/>
    <text x="36" y="36" text-anchor="middle" dominant-baseline="central"
          font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="32" font-weight="800" fill="#0A0A0B" letter-spacing="-0.5">СД</text>
  </g>
  <text x="170" y="125" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="600" fill="#F4F4F5" letter-spacing="0.5">Дмитриев</text>

  <!-- Eyebrow -->
  <text x="80" y="270" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="600" fill="#F59E0B" letter-spacing="4">DEVOPS · INFRASTRUCTURE CONSULTING</text>

  <!-- Main headline -->
  <text x="80" y="345" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="700" fill="#F4F4F5" letter-spacing="-1.5">Инфраструктура</text>
  <text x="80" y="420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="700" fill="#F4F4F5" letter-spacing="-1.5">как актив,</text>
  <text x="80" y="495" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="700" fill="#F59E0B" letter-spacing="-1.5">а не костыль.</text>

  <!-- Bottom rule + brand line -->
  <rect x="80" y="545" width="60" height="3" fill="#F59E0B"/>
  <text x="80" y="580" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#A1A1AA">brandbook.graywrk.ru</text>
</svg>
